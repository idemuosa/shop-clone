version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=shop
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"

  backend-django:
    build: ./backend_django
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/shop
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY:-prod-secret-key}
      - DEBUG=False
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend-proxy:
    build: .
    environment:
      - NODE_ENV=production
      - PYTHON_API=http://backend-django:8000
      - RESEND_API_KEY=${RESEND_API_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - FIREBASE_SERVICE_ACCOUNT_KEY=${FIREBASE_SERVICE_ACCOUNT_KEY}
      - PAYSTACK_SECRET_KEY=${PAYSTACK_SECRET_KEY}
    depends_on:
      - backend-django
    ports:
      - "3000:3000"

volumes:
  postgres_data:
